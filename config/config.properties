abstract=This ontology models story plots in terms of characters, events, locations, and temporal relations. It is designed to answer competency questions about kinship, where characters go, who participates in events, temporal ordering, spatial overlap, story endings, and items used in actions. The Narn i Chîn Húrin (The Tale of the Children of Húrin) is used as the main example.

